<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lane Topology — Interactive Map Demo</title>
    <meta name="description" content="Interactive map demo showing lane-level network topology at intersections with turn arrows and satellite imagery.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Full-screen map -->
    <div id="map"></div>

    <!-- Floating control panel -->
    <div id="control-panel">
        <div class="panel-header">
            <span class="panel-icon">◈</span>
            <span class="panel-title">Lane Topology</span>
        </div>

        <div class="panel-section">
            <label class="panel-label" for="intersection-select">Intersection</label>
            <select id="intersection-select" class="panel-select">
                <option value="inter_1">Elizabeth St &amp; Park St</option>
                <option value="inter_2">Glebe Point Rd &amp; Francis St</option>
                <option value="inter_3">Epping Rd &amp; Balaclava Rd</option>
                <option value="inter_4">Parramatta Rd &amp; Woodville Rd</option>
            </select>
        </div>

        <div class="panel-section">
            <label class="panel-label">Tile Layer</label>
            <div class="tile-toggle">
                <button id="btn-satellite" class="tile-btn active" onclick="setTileLayer('satellite')">Satellite</button>
                <button id="btn-osm" class="tile-btn" onclick="setTileLayer('osm')">OSM</button>
            </div>
        </div>

        <div class="panel-section">
            <label class="panel-label">Data Mode</label>
            <div class="tile-toggle">
                <button id="btn-processed" class="tile-btn active" onclick="setDataMode('processed')">Processed</button>
                <button id="btn-raw" class="tile-btn" onclick="setDataMode('raw')">Raw</button>
            </div>
        </div>

        <div class="panel-divider"></div>

        <!-- Intersection info -->
        <div id="intersection-info" class="panel-section">
            <div id="info-name" class="info-name"></div>
            <div id="info-location" class="info-location"></div>
            <div id="info-desc" class="info-desc"></div>
        </div>

        <div class="panel-divider"></div>

        <!-- Legend -->
        <div class="panel-section">
            <label class="panel-label">Legend</label>
            <div class="legend-items">
                <div class="legend-item">
                    <span class="legend-line" style="background:#3b82f6"></span>
                    <span>Approach Lane</span>
                </div>
                <div class="legend-item">
                    <span class="legend-line" style="background:#22c55e"></span>
                    <span>Exit Lane</span>
                </div>
                <div class="legend-item">
                    <span class="legend-line" style="background:#facc15; height:2px; border-style:dashed"></span>
                    <span>Lane Divider</span>
                </div>
                <div class="legend-item">
                    <span class="legend-arrow">↰</span>
                    <span>Left Turn</span>
                </div>
                <div class="legend-item">
                    <span class="legend-arrow" style="color:#fff">↑</span>
                    <span>Through</span>
                </div>
                <div class="legend-item">
                    <span class="legend-arrow" style="color:#f97316">↱</span>
                    <span>Right Turn</span>
                </div>
            </div>
        </div>

        <div class="panel-divider"></div>

        <!-- Click instruction -->
        <div class="panel-section">
            <div class="click-hint">
                <span class="hint-icon">👆</span>
                <span>Click a lane to see its turn path</span>
            </div>
        </div>
    </div>

    <!-- Turn info popup (appears when lane clicked) -->
    <div id="turn-info" class="turn-info hidden">
        <div class="turn-info-header">
            <span id="turn-info-title">Lane Info</span>
            <button class="turn-info-close" onclick="closeTurnInfo()">✕</button>
        </div>
        <div id="turn-info-body"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
